<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduGenie – AI Learning Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #e8e9f0; min-height: 100vh; color: #1a1a2e; }
    #conn-banner { max-width: 760px; margin: 12px auto 0; padding: 0 20px; }
    .banner-ok { background: #f0fdf4; color: #15803d; border: 1.5px solid #bbf7d0; padding: 10px 16px; border-radius: 10px; font-size: 0.88rem; font-weight: 500; }
    .banner-err { background: #fff0f0; color: #b91c1c; border: 1.5px solid #fecaca; padding: 14px 16px; border-radius: 10px; font-size: 0.88rem; line-height: 1.8; }
    .banner-err code { display: block; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 8px 12px; margin-top: 8px; font-family: monospace; font-size: 0.85rem; color: #7f1d1d; }
    header { text-align: center; padding: 36px 20px 22px; }
    header h1 { font-size: 2rem; font-weight: 700; color: #1a1a2e; letter-spacing: -0.5px; }
    header p { margin-top: 8px; font-size: 1rem; color: #555; }
    .tab-nav { display: flex; justify-content: center; gap: 8px; padding: 0 20px 28px; flex-wrap: wrap; }
    .tab-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid transparent; background: white; color: #555; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .tab-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .tab-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    main { max-width: 760px; margin: 0 auto; padding: 0 20px 60px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .section-card { background: white; border-radius: 16px; padding: 28px 28px 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .section-card h2 { font-size: 1rem; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
    .input-row { display: flex; gap: 10px; align-items: center; }
    .input-row input, .input-row textarea { flex: 1; padding: 12px 16px; border: 1.5px solid #e0e0e8; border-radius: 10px; font-size: 0.95rem; color: #333; background: #fafafa; outline: none; transition: border-color 0.2s; font-family: inherit; }
    .input-row input:focus, .input-row textarea:focus { border-color: #3b82f6; background: white; }
    .input-row textarea { resize: vertical; min-height: 80px; }
    .btn-blue { padding: 12px 22px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.2s, transform 0.1s; font-family: inherit; }
    .btn-blue:hover { background: #2563eb; }
    .btn-blue:active { transform: scale(0.97); }
    .btn-blue:disabled { background: #93c5fd; cursor: not-allowed; }
    .lang-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .lang-row label { font-size: 0.85rem; color: #666; font-weight: 500; }
    .lang-row select { padding: 6px 12px; border: 1.5px solid #e0e0e8; border-radius: 8px; font-size: 0.88rem; color: #333; background: #fafafa; outline: none; cursor: pointer; }
    .result-box { margin-top: 16px; padding: 16px; background: #f0f4ff; border-radius: 10px; border-left: 4px solid #3b82f6; font-size: 0.93rem; line-height: 1.65; color: #1a1a2e; display: none; white-space: pre-wrap; word-wrap: break-word; }
    .result-box.visible { display: block; }
    .result-box.error { background: #fff0f0; border-color: #ef4444; color: #b91c1c; }
    .file-row { margin-top: 12px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .file-row label { font-size: 0.82rem; color: #777; }
    .file-row input[type="file"] { font-size: 0.82rem; color: #555; }
    .quiz-question { background: white; border: 1.5px solid #e0e0e8; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
    .quiz-question p.q-text { font-weight: 600; font-size: 0.95rem; margin-bottom: 12px; color: #1a1a2e; }
    .quiz-option { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; cursor: pointer; border: 1.5px solid #e0e0e8; transition: border-color 0.15s, background 0.15s; font-size: 0.9rem; color: #333; }
    .quiz-option:hover { border-color: #3b82f6; background: #f0f4ff; }
    .quiz-option.correct { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
    .quiz-option.wrong { border-color: #ef4444; background: #fff0f0; color: #b91c1c; }
    .quiz-explanation { margin-top: 10px; padding: 10px 14px; background: #fffbeb; border-radius: 8px; font-size: 0.85rem; color: #92400e; border-left: 3px solid #f59e0b; display: none; }
    .chat-window { background: #fafafa; border: 1.5px solid #e0e0e8; border-radius: 12px; height: 340px; overflow-y: auto; padding: 16px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 10px; }
    .chat-empty { color: #aaa; font-size: 0.9rem; margin: auto; text-align: center; }
    .chat-msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.55; word-wrap: break-word; white-space: pre-wrap; }
    .chat-msg.user { background: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .chat-msg.bot { background: white; color: #1a1a2e; align-self: flex-start; border: 1.5px solid #e0e0e8; border-bottom-left-radius: 4px; }
    .chat-msg.typing { color: #aaa; font-style: italic; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #aaa; }
    @media (max-width: 500px) { .input-row { flex-direction: column; } .btn-blue { width: 100%; } header h1 { font-size: 1.5rem; } }
  </style>
</head>
<body>

<div id="conn-banner"><div id="conn-msg"></div></div>

<header>
  <h1>Welcome to EduGenie &#129504;&#10024;</h1>
  <p>Your personal AI tutor for learning support!</p>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('ask',this)">Ask a Question</button>
  <button class="tab-btn" onclick="switchTab('explain',this)">Explain</button>
  <button class="tab-btn" onclick="switchTab('summary',this)">Summarize</button>
  <button class="tab-btn" onclick="switchTab('quiz',this)">Quiz Me</button>
  <button class="tab-btn" onclick="switchTab('chat',this)">Chat</button>
</nav>

<main>
  <div id="tab-ask" class="tab-panel active">
    <div class="section-card">
      <h2>Ask EduGenie a Question:</h2>
      <div class="lang-row"><label>Language:</label>
        <select id="ask-lang"><option>English</option><option>Hindi</option><option>Telugu</option><option>Tamil</option><option>Spanish</option><option>French</option></select>
      </div>
      <div class="input-row">
        <input type="text" id="ask-input" placeholder="Why is the sky blue?" />
        <button class="btn-blue" id="ask-btn" onclick="askQuestion()">Get Answer</button>
      </div>
      <div class="result-box" id="ask-result"></div>
    </div>
  </div>

  <div id="tab-explain" class="tab-panel">
    <div class="section-card">
      <h2>Need an Explanation?</h2>
      <div class="lang-row"><label>Language:</label>
        <select id="explain-lang"><option>English</option><option>Hindi</option><option>Telugu</option><option>Tamil</option><option>Spanish</option><option>French</option></select>
      </div>
      <div class="input-row">
        <input type="text" id="explain-input" placeholder="Photosynthesis" />
        <button class="btn-blue" id="explain-btn" onclick="explainTopic()">Explain</button>
      </div>
      <div class="result-box" id="explain-result"></div>
    </div>
  </div>

  <div id="tab-summary" class="tab-panel">
    <div class="section-card">
      <h2>Summarize a Paragraph:</h2>
      <div class="lang-row"><label>Language:</label>
        <select id="summary-lang"><option>English</option><option>Hindi</option><option>Telugu</option><option>Tamil</option><option>Spanish</option><option>French</option></select>
      </div>
      <div class="input-row">
        <textarea id="summary-input" placeholder="Paste long content to summarize"></textarea>
      </div>
      <div class="file-row">
        <label>Or upload (PDF / DOCX / PPTX):</label>
        <input type="file" id="summary-file" accept=".pdf,.docx,.pptx" />
      </div>
      <div style="margin-top:14px;">
        <button class="btn-blue" id="summary-btn" onclick="summarizeContent()">Summarize</button>
      </div>
      <div class="result-box" id="summary-result"></div>
    </div>
  </div>

  <div id="tab-quiz" class="tab-panel">
    <div class="section-card">
      <h2>Generate a Quiz:</h2>
      <div class="lang-row"><label>Language:</label>
        <select id="quiz-lang"><option>English</option><option>Hindi</option><option>Telugu</option><option>Tamil</option><option>Spanish</option><option>French</option></select>
      </div>
      <div class="input-row">
        <input type="text" id="quiz-input" placeholder="e.g. Newton's Laws of Motion" />
        <button class="btn-blue" id="quiz-btn" onclick="generateQuiz()">Generate Quiz</button>
      </div>
      <div class="file-row">
        <label>Or upload (PDF / DOCX / PPTX):</label>
        <input type="file" id="quiz-file" accept=".pdf,.docx,.pptx" />
      </div>
      <div class="result-box error" id="quiz-error"></div>
    </div>
    <div id="quiz-container"></div>
  </div>

  <div id="tab-chat" class="tab-panel">
    <div class="section-card">
      <h2>Chat with EduGenie:</h2>
      <div class="chat-window" id="chat-window">
        <div class="chat-empty" id="chat-placeholder">Start a conversation with EduGenie...</div>
      </div>
      <div class="input-row">
        <input type="text" id="chat-input" placeholder="Ask anything..." />
        <button class="btn-blue" id="chat-btn" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</main>

<footer>Powered by Google Gemini &middot; EduGenie &copy; 2025</footer>

<script>
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function setLoading(btn, on) {
  btn.disabled = on;
  if (on) { btn._orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span>Loading...'; }
  else { btn.innerHTML = btn._orig || btn.innerHTML; }
}

function showResult(el, text, isError) {
  el.textContent = text;
  el.className = 'result-box visible' + (isError ? ' error' : '');
}

async function safeFetch(url, options) {
  try {
    var res = await fetch(url, options);
    var raw = await res.text();
    if (raw.trim().charAt(0) === '<') {
      var m = raw.match(/<title>(.*?)<\/title>/i);
      var title = m ? m[1] : ('HTTP ' + res.status);
      return { ok: false, error: 'Server returned ' + res.status + ': ' + title + '\n\nMake sure you opened this page via Flask:\n1. Run: python app.py\n2. Go to: http://127.0.0.1:5000' };
    }
    try {
      var data = JSON.parse(raw);
      return { ok: res.ok, data: data, error: data.error || null };
    } catch(e) {
      return { ok: false, error: 'Invalid response: ' + raw.slice(0, 120) };
    }
  } catch(e) {
    return { ok: false, error: 'Cannot reach server.\n\nRun: python app.py\nThen open: http://127.0.0.1:5000\n\n(' + e.message + ')' };
  }
}

async function checkHealth() {
  var banner = document.getElementById('conn-banner');
  var msg = document.getElementById('conn-msg');
  try {
    var res = await fetch('/health');
    if (res.ok) {
      msg.className = 'banner-ok';
      msg.textContent = 'Connected to EduGenie server successfully.';
      setTimeout(function(){ banner.style.display = 'none'; }, 3000);
    } else { throw new Error('HTTP ' + res.status); }
  } catch(e) {
    msg.className = 'banner-err';
    msg.innerHTML = '<strong>Cannot connect to Flask server.</strong> You must open this page through Flask, not by double-clicking the file.<code>1. Open terminal in your project folder\n2. Run: python app.py\n3. Open browser: http://127.0.0.1:5000</code>';
  }
}

async function askQuestion() {
  var q = document.getElementById('ask-input').value.trim();
  var lang = document.getElementById('ask-lang').value;
  var btn = document.getElementById('ask-btn');
  var result = document.getElementById('ask-result');
  if (!q) { showResult(result, 'Please enter a question.', true); return; }
  setLoading(btn, true);
  var r = await safeFetch('/ask', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({question: q, lang: lang}) });
  setLoading(btn, false);
  r.error ? showResult(result, r.error, true) : showResult(result, r.data.answer || 'No answer returned.');
}

async function explainTopic() {
  var topic = document.getElementById('explain-input').value.trim();
  var lang = document.getElementById('explain-lang').value;
  var btn = document.getElementById('explain-btn');
  var result = document.getElementById('explain-result');
  if (!topic) { showResult(result, 'Please enter a topic.', true); return; }
  setLoading(btn, true);
  var r = await safeFetch('/ask', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({question: 'Explain clearly and in detail: ' + topic, lang: lang}) });
  setLoading(btn, false);
  r.error ? showResult(result, r.error, true) : showResult(result, r.data.answer || 'No explanation returned.');
}

async function summarizeContent() {
  var content = document.getElementById('summary-input').value.trim();
  var file = document.getElementById('summary-file').files[0];
  var lang = document.getElementById('summary-lang').value;
  var btn = document.getElementById('summary-btn');
  var result = document.getElementById('summary-result');
  if (!content && !file) { showResult(result, 'Please enter text or upload a file.', true); return; }
  setLoading(btn, true);
  var fd = new FormData();
  fd.append('lang', lang);
  if (file) fd.append('file', file); else fd.append('content', content);
  var r = await safeFetch('/summary', { method: 'POST', body: fd });
  setLoading(btn, false);
  r.error ? showResult(result, r.error, true) : showResult(result, r.data.summary || 'No summary returned.');
}

async function generateQuiz() {
  var topic = document.getElementById('quiz-input').value.trim();
  var file = document.getElementById('quiz-file').files[0];
  var lang = document.getElementById('quiz-lang').value;
  var btn = document.getElementById('quiz-btn');
  var errBox = document.getElementById('quiz-error');
  var container = document.getElementById('quiz-container');
  if (!topic && !file) { showResult(errBox, 'Please enter a topic or upload a file.', true); return; }
  errBox.className = 'result-box'; container.innerHTML = '';
  setLoading(btn, true);
  var fd = new FormData();
  fd.append('lang', lang);
  if (file) fd.append('file', file); else fd.append('topic', topic);
  var r = await safeFetch('/quiz', { method: 'POST', body: fd });
  setLoading(btn, false);
  if (r.error) showResult(errBox, r.error, true);
  else if (r.data && r.data.quiz) renderQuiz(r.data.quiz);
  else showResult(errBox, 'No quiz data returned.', true);
}

function renderQuiz(questions) {
  var c = document.getElementById('quiz-container');
  c.innerHTML = '';
  questions.forEach(function(q, qi) {
    var card = document.createElement('div');
    card.className = 'quiz-question';
    card.innerHTML = '<p class="q-text">' + (qi+1) + '. ' + q.question + '</p>';
    ['A','B','C','D'].forEach(function(letter) {
      var opt = document.createElement('div');
      opt.className = 'quiz-option';
      opt.innerHTML = '<strong>' + letter + '.</strong> ' + q.options[letter];
      opt.onclick = function() {
        if (card.dataset.answered) return;
        card.dataset.answered = '1';
        card.querySelectorAll('.quiz-option').forEach(function(o){ o.style.pointerEvents='none'; });
        if (letter === q.correct) opt.classList.add('correct');
        else {
          opt.classList.add('wrong');
          card.querySelectorAll('.quiz-option')[['A','B','C','D'].indexOf(q.correct)].classList.add('correct');
        }
        card.querySelector('.quiz-explanation').style.display = 'block';
      };
      card.appendChild(opt);
    });
    var exp = document.createElement('div');
    exp.className = 'quiz-explanation';
    exp.textContent = 'Explanation: ' + q.explanation;
    card.appendChild(exp);
    c.appendChild(card);
  });
}

async function sendChat() {
  var input = document.getElementById('chat-input');
  var msg = input.value.trim();
  if (!msg) return;
  var win = document.getElementById('chat-window');
  var btn = document.getElementById('chat-btn');
  var placeholder = document.getElementById('chat-placeholder');
  if (placeholder) placeholder.remove();
  appendMsg(win, msg, 'user');
  input.value = '';
  btn.disabled = true;
  var typingEl = appendMsg(win, 'EduGenie is thinking...', 'bot typing');
  try {
    var res = await fetch('/chat', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({message: msg}) });
    var ct = res.headers.get('content-type') || '';
    if (!res.ok || ct.includes('text/html')) {
      var text = await res.text();
      var m = text.match(/<title>(.*?)<\/title>/i);
      typingEl.textContent = 'Server error ' + res.status + ': ' + (m ? m[1] : 'Unknown') + '. Check Flask terminal.';
      typingEl.className = 'chat-msg bot';
      btn.disabled = false;
      return;
    }
    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var fullText = '';
    typingEl.textContent = '';
    typingEl.className = 'chat-msg bot';
    while (true) {
      var result = await reader.read();
      if (result.done) break;
      var chunk = decoder.decode(result.value, {stream: true});
      chunk.split('\n').forEach(function(line) {
        if (line.startsWith('data: ')) {
          var piece = line.slice(6);
          fullText += piece.startsWith('[ERROR]') ? piece.slice(7).trim() : piece;
          typingEl.textContent = fullText;
          win.scrollTop = win.scrollHeight;
        }
      });
    }
    if (!fullText) typingEl.textContent = 'No response received.';
  } catch(e) {
    typingEl.textContent = 'Cannot reach Flask server. Run: python app.py (' + e.message + ')';
    typingEl.className = 'chat-msg bot';
  }
  btn.disabled = false;
  win.scrollTop = win.scrollHeight;
}

function appendMsg(win, text, cls) {
  var el = document.createElement('div');
  el.className = 'chat-msg ' + cls;
  el.textContent = text;
  win.appendChild(el);
  win.scrollTop = win.scrollHeight;
  return el;
}

document.getElementById('ask-input').addEventListener('keydown', function(e){ if(e.key==='Enter') askQuestion(); });
document.getElementById('explain-input').addEventListener('keydown', function(e){ if(e.key==='Enter') explainTopic(); });
document.getElementById('chat-input').addEventListener('keydown', function(e){ if(e.key==='Enter') sendChat(); });

checkHealth();
</script>
</body>
</html>
